services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data

  app:
    build: .
    network_mode: host
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://localhost:6380
      - OLLAMA_URL=http://localhost:11434

volumes:
  redis-data:
